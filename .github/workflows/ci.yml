name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "release/**"

jobs:
  validate-userscripts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate userscripts
        run: node tools/validate-userscripts.js
