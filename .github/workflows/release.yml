name: Release userscript

on:
  workflow_dispatch:
    inputs:
      script_id:
        description: Script ID from scripts.json
        required: true
        type: string
      version:
        description: Version expected in the userscript @version field
        required: true
        type: string
      create_github_release:
        description: Create a GitHub Release with the .user.js artifact
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate userscripts
        run: node tools/validate-userscripts.js

      - name: Resolve release metadata
        id: meta
        uses: actions/github-script@v7
        env:
          SCRIPT_ID: ${{ inputs.script_id }}
          EXPECTED_VERSION: ${{ inputs.version }}
        with:
          script: |
            const fs = require("fs");
            const scripts = JSON.parse(fs.readFileSync("scripts.json", "utf8"));
            const scriptId = process.env.SCRIPT_ID;
            const expectedVersion = process.env.EXPECTED_VERSION;
            const script = scripts.find((item) => item.id === scriptId);
            if (!script) {
              core.setFailed(`Unknown script_id: ${scriptId}`);
              return;
            }

            const source = fs.readFileSync(script.entry, "utf8");
            const versionMatch = source.match(/^\/\/\s+@version\s+(.+)$/m);
            if (!versionMatch) {
              core.setFailed(`Missing @version in ${script.entry}`);
              return;
            }

            const actualVersion = versionMatch[1].trim();
            if (actualVersion !== expectedVersion) {
              core.setFailed(`Version mismatch for ${script.id}: expected ${expectedVersion}, found ${actualVersion}`);
              return;
            }

            const tag = `${script.id}-v${actualVersion}`;
            core.setOutput("entry", script.entry);
            core.setOutput("changelog", script.changelog || "");
            core.setOutput("release_branch", script.releaseBranch);
            core.setOutput("tag", tag);
            core.setOutput("release_name", `${script.name || script.id} v${actualVersion}`);

      - name: Update release branch and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify refs/tags/${{ steps.meta.outputs.tag }} >/dev/null; then
            echo "Tag already exists: ${{ steps.meta.outputs.tag }}"
            exit 1
          fi
          git push origin HEAD:refs/heads/${{ steps.meta.outputs.release_branch }}
          git tag ${{ steps.meta.outputs.tag }}
          git push origin refs/tags/${{ steps.meta.outputs.tag }}

      - name: Create GitHub Release
        if: ${{ inputs.create_github_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_name }}
          files: ${{ steps.meta.outputs.entry }}
          body_path: ${{ steps.meta.outputs.changelog }}
